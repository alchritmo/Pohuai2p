<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2026 泰國旅遊即時導路</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { font-family: "PingFang TC", "Heiti TC", sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); }
        .day-tab-active { background: #6366f1; color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .bottom-sheet { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 標籤顏色定義 */
        .tag-flight { background: #fff7ed; color: #c2410c; }
        .tag-transport { background: #f1f5f9; color: #475569; }
        .tag-spot { background: #f0fdf4; color: #166534; }
        .tag-food { background: #fef2f2; color: #991b1b; }
        .tag-hotel { background: #eef2ff; color: #3730a3; }
    </style>
</head>
<body class="bg-[#FBFBFF] text-slate-900 transition-all duration-200">

<div id="realtime-header" class="fixed top-0 w-full z-[110] bg-indigo-900 text-white p-3 shadow-lg hidden">
    <div class="flex justify-between items-center text-[10px] font-bold tracking-widest px-2">
        <span id="flight-live-status">✈️ JX741：查詢中...</span>
        <span id="hsr-live-status">🚄 報到櫃檯：待更新</span>
    </div>
</div>

<nav class="glass-nav fixed top-0 w-full z-[100] border-b border-slate-100 transition-all duration-300" id="main-nav">
    <div class="px-5 py-5 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <h1 class="font-black text-xl tracking-tighter italic cursor-pointer" onclick="switchView('list')">THAI.26</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex bg-slate-100 rounded-lg p-1">
                <button onclick="adjustFont(-2)" class="px-2 text-xs font-bold text-slate-500">A-</button>
                <button onclick="adjustFont(2)" class="px-2 text-xs font-bold text-slate-500">A+</button>
            </div>
            <div id="nav-action-zone">
                <button onclick="switchView('stats')" class="bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-full text-xs font-bold">花費統計</button>
            </div>
        </div>
    </div>
    
    <div id="day-nav" class="flex gap-3 px-5 pb-4 overflow-x-auto no-scrollbar pt-1">
        <button onclick="setDay(1)" class="day-tab flex-shrink-0 px-5 py-2 rounded-2xl text-xs font-bold bg-white border border-slate-100 transition-all" id="tab-1">D1 3/19</button>
        <button onclick="setDay(2)" class="day-tab flex-shrink-0 px-5 py-2 rounded-2xl text-xs font-bold bg-white border border-slate-100 transition-all" id="tab-2">D2 3/20</button>
        <button onclick="setDay(3)" class="day-tab flex-shrink-0 px-5 py-2 rounded-2xl text-xs font-bold bg-white border border-slate-100 transition-all" id="tab-3">D3 3/21</button>
        <button onclick="setDay(4)" class="day-tab flex-shrink-0 px-5 py-2 rounded-2xl text-xs font-bold bg-white border border-slate-100 transition-all" id="tab-4">D4 3/22</button>
        <button onclick="setDay(5)" class="day-tab flex-shrink-0 px-5 py-2 rounded-2xl text-xs font-bold bg-white border border-slate-100 transition-all" id="tab-5">D5 3/23</button>
        <button onclick="setDay(6)" class="day-tab flex-shrink-0 px-5 py-2 rounded-2xl text-xs font-bold bg-white border border-slate-100 transition-all" id="tab-6">D6 3/24</button>
    </div>
</nav>

<main id="view-list" class="pt-44 p-5 space-y-4 pb-32">
    <div id="transport-suggestion" class="hidden bg-white p-6 rounded-[2rem] shadow-sm border border-indigo-50 mb-6">
        <h3 id="suggestion-title" class="text-xs font-black text-indigo-400 mb-3 uppercase tracking-widest">即時資訊建議</h3>
        <div class="space-y-3" id="suggestion-box"></div>
    </div>
    <div id="card-container" class="space-y-4"></div>
</main>

<main id="view-stats" class="pt-44 p-5 hidden space-y-6 pb-32">
    <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl">
        <p class="text-slate-400 text-xs font-bold mb-2">總支出概覽</p>
        <h2 id="grand-total" class="text-4xl font-black italic">฿0</h2>
        <div class="grid grid-cols-2 gap-4 pt-6 border-t border-slate-800 mt-6">
            <div><p class="text-[10px] text-slate-500 font-bold">博懷 已付</p><p id="total-bohuai" class="text-lg font-bold">฿0</p></div>
            <div><p class="text-[10px] text-slate-500 font-bold">阿正 已付</p><p id="total-azheng" class="text-lg font-bold">฿0</p></div>
        </div>
    </div>
    <div id="category-stats" class="bg-white rounded-[2rem] p-6 shadow-sm space-y-4"></div>
</main>

<div id="modal-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-[200]" onclick="closeModal()"></div>
<div id="modal" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] z-[210] bottom-sheet translate-y-full p-8 pb-12 shadow-2xl max-h-[90vh] overflow-y-auto">
    <div class="w-12 h-1 bg-slate-100 rounded-full mx-auto mb-8"></div>
    <div class="flex justify-between items-center mb-6">
        <h3 id="modal-title" class="text-xl font-bold">編輯行程</h3>
        <button onclick="deleteData()" id="btn-delete" class="text-red-500 text-sm font-bold">刪除</button>
    </div>
    <div class="space-y-5">
        <input type="text" id="m-title" placeholder="項目名稱" class="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold">
        <div class="grid grid-cols-2 gap-4">
            <input type="text" id="m-time" placeholder="時間 (HH:mm)" class="bg-slate-50 p-4 rounded-2xl outline-none">
            <select id="m-type" class="bg-slate-50 p-4 rounded-2xl outline-none font-bold text-indigo-600">
                <option value="spot">景點</option><option value="food">美食</option><option value="transport">交通</option><option value="hotel">飯店</option><option value="flight">航班</option>
            </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <input type="number" id="m-cost" placeholder="金額 (THB)" class="bg-slate-50 p-4 rounded-2xl outline-none font-bold text-lg">
            <select id="m-payer" class="bg-slate-50 p-4 rounded-2xl outline-none font-bold italic">
                <option value="博懷">博懷</option><option value="阿正">阿正</option>
            </select>
        </div>
        <input type="text" id="m-url" placeholder="地圖或網頁網址" class="w-full bg-slate-50 p-4 rounded-2xl outline-none text-blue-500 text-sm">
        <textarea id="m-note" placeholder="備註內容" class="w-full bg-slate-50 p-4 rounded-2xl outline-none h-24 text-sm"></textarea>
        <button onclick="saveData()" class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-bold active:scale-95 transition-all">同步至雲端</button>
    </div>
</div>

<button onclick="openAddModal()" class="fixed bottom-10 right-8 bg-indigo-600 text-white w-16 h-16 rounded-full shadow-2xl z-50 flex items-center justify-center active:scale-90 transition-all text-3xl font-light">+</button>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyTRAUKi7Uo8Mn0ih_q9qx4LBHM_6nwGIb6MLK1n1z46p4WcP9sMpLeuGS3utgMNQ19ZA/exec";
    let allData = [];
    let currentDay = 1;
    let currentEditId = null;
    let fontSize = 16;

    function adjustFont(d) {
        fontSize += d;
        document.documentElement.style.fontSize = fontSize + 'px';
        localStorage.setItem('prefFS', fontSize);
    }

    async function fetchData() {
        try {
            const res = await fetch(GAS_URL);
            allData = await res.json();
            render();
            calcStats();
            updateRealtimeInfo();
        } catch (e) { console.error("資料加載失敗", e); }
    }

    // 核心功能：即時資訊與佈局調整
    function updateRealtimeInfo() {
        const header = document.getElementById('realtime-header');
        const suggestion = document.getElementById('transport-suggestion');
        const mainNav = document.getElementById('main-nav');
        const viewList = document.getElementById('view-list');
        const viewStats = document.getElementById('view-stats');
        
        // 重設佈局
        header.classList.add('hidden');
        suggestion.classList.add('hidden');
        mainNav.style.top = '0px';
        viewList.style.paddingTop = '10rem';
        viewStats.style.paddingTop = '10rem';

        if (currentDay === 1) {
            header.classList.remove('hidden');
            mainNav.style.top = '40px';
            viewList.style.paddingTop = '12rem';
            document.getElementById('flight-live-status').innerHTML = `✈️ JX741 (09:25): 準點 / 登機門: 尚未公佈`;
            document.getElementById('hsr-live-status').innerText = `🕒 櫃檯: T2 - 6號 (07:25 前報到)`;
        } else if (currentDay === 6) {
            header.classList.remove('hidden');
            suggestion.classList.remove('hidden');
            mainNav.style.top = '40px';
            viewList.style.paddingTop = '12rem';
            viewStats.style.paddingTop = '12rem';
            
            document.getElementById('flight-live-status').innerHTML = `✈️ JX742 (13:45): 準點 / 行李轉盤: 待更新`;
            document.getElementById('hsr-live-status').innerText = `🚄 下一班回台中: 21:10`;
            
            document.getElementById('suggestion-title').innerText = "3/24 返台接駁建議";
            document.getElementById('suggestion-box').innerHTML = `
                <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                    <span class="text-xs font-bold text-slate-700">行李轉盤 (預計)</span>
                    <span class="text-xs text-indigo-500 font-black italic">T2 - 6號轉盤</span>
                </div>
                <div class="flex justify-between items-center pt-2">
                    <span class="text-xs font-bold text-slate-700">高鐵推薦車次 (桃園 → 台中)</span>
                    <span class="text-xs text-indigo-500 font-black">21:10 (853) / 21:21 (1257)</span>
                </div>
            `;
        }
    }

    function setDay(d) {
        currentDay = d;
        document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('day-tab-active'));
        document.getElementById(`tab-${d}`).classList.add('day-tab-active');
        switchView('list');
        render();
        updateRealtimeInfo();
    }

    function render() {
        const container = document.getElementById('card-container');
        container.innerHTML = '';
        const filtered = allData.filter(d => d.Day == currentDay);

        if (filtered.length === 0) {
            container.innerHTML = `<div class="text-center py-20 text-slate-300 font-bold italic">No Plans Today.</div>`;
            return;
        }

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = "bg-white p-6 rounded-[2.2rem] shadow-sm border border-slate-50 active:scale-[0.98] transition-all relative";
            card.onclick = () => openEditModal(item);
            
            const timeStr = item.Time ? (String(item.Time).includes('T') ? item.Time.split('T')[1].substring(0, 5) : String(item.Time).substring(0, 5)) : '--:--';
            
            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <span class="px-3 py-1 rounded-full text-[10px] font-bold tag-${item.Type || 'spot'} uppercase tracking-widest">${item.Type || 'spot'}</span>
                    ${item.URL ? `<button onclick="event.stopPropagation(); window.open('${item.URL}')" class="text-indigo-600 font-black text-[10px] italic">GO MAP</button>` : ''}
                </div>
                <div class="flex items-end justify-between">
                    <div class="flex-1 pr-4">
                        <p class="text-[10px] font-black text-slate-300 uppercase mb-1">${timeStr}</p>
                        <h4 class="font-bold text-slate-800 text-lg leading-tight break-all">${item.Title}</h4>
                        <p class="text-[10px] text-slate-400 mt-2 line-clamp-1 italic">${item.Note || ''}</p>
                    </div>
                    ${item.Cost ? `
                    <div class="text-right flex-shrink-0">
                        <p class="text-xs font-black text-slate-700 italic">฿${parseInt(item.Cost).toLocaleString()}</p>
                        <p class="text-[8px] font-bold text-indigo-400">${item.Payer}</p>
                    </div>` : ''}
                </div>
            `;
            container.appendChild(card);
        });
        new Sortable(container, { animation: 150 });
    }

    function switchView(v) {
        const isList = v === 'list';
        document.getElementById('view-list').classList.toggle('hidden', !isList);
        document.getElementById('view-stats').classList.toggle('hidden', isList);
        document.getElementById('day-nav').classList.toggle('hidden', !isList);
        
        const actionZone = document.getElementById('nav-action-zone');
        if (isList) {
            actionZone.innerHTML = `<button onclick="switchView('stats')" class="bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-full text-xs font-bold">花費統計</button>`;
        } else {
            actionZone.innerHTML = `<button onclick="switchView('list')" class="bg-slate-900 text-white px-4 py-1.5 rounded-full text-xs font-bold">返回行程</button>`;
        }
    }

    function calcStats() {
        let b = 0, a = 0, total = 0;
        const catMap = {};
        allData.forEach(d => {
            const c = parseFloat(d.Cost) || 0;
            total += c;
            if (d.Payer === '博懷') b += c;
            if (d.Payer === '阿正') a += c;
            const type = d.Type || 'spot';
            catMap[type] = (catMap[type] || 0) + c;
        });
        document.getElementById('grand-total').innerText = `฿${total.toLocaleString()}`;
        document.getElementById('total-bohuai').innerText = `฿${b.toLocaleString()}`;
        document.getElementById('total-azheng').innerText = `฿${a.toLocaleString()}`;

        const catContainer = document.getElementById('category-stats');
        catContainer.innerHTML = '<h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">支出分類</h3>';
        for (const [type, amt] of Object.entries(catMap)) {
            const pct = total > 0 ? (amt/total*100).toFixed(0) : 0;
            catContainer.innerHTML += `
                <div class="flex items-center justify-between">
                    <span class="text-sm font-bold text-slate-600 uppercase">${type}</span>
                    <div class="text-right">
                        <span class="text-sm font-black text-slate-800">฿${amt.toLocaleString()}</span>
                        <span class="text-[10px] text-slate-400 ml-1">${pct}%</span>
                    </div>
                </div>
            `;
        }
    }

    function openEditModal(item) {
        currentEditId = item.ID;
        document.getElementById('modal-title').innerText = "編輯項目";
        document.getElementById('m-title').value = item.Title;
        document.getElementById('m-time').value = item.Time ? String(item.Time).substring(0, 5) : "";
        document.getElementById('m-type').value = item.Type || 'spot';
        document.getElementById('m-cost').value = item.Cost || "";
        document.getElementById('m-payer').value = item.Payer || '博懷';
        document.getElementById('m-url').value = item.URL || "";
        document.getElementById('m-note').value = item.Note || "";
        document.getElementById('btn-delete').style.display = 'block';
        showModal();
    }

    function openAddModal() { 
        currentEditId = null; 
        document.getElementById('modal-title').innerText = "新增行程";
        document.getElementById('m-title').value = ""; 
        document.getElementById('m-time').value = "";
        document.getElementById('m-cost').value = "";
        document.getElementById('m-note').value = "";
        document.getElementById('btn-delete').style.display = 'none'; 
        showModal(); 
    }
    
    function showModal() { document.getElementById('modal-overlay').classList.remove('hidden'); document.getElementById('modal').classList.remove('translate-y-full'); }
    function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); document.getElementById('modal').classList.add('translate-y-full'); }
    
    async function saveData() {
        const payload = { 
            action: currentEditId ? "update" : "add", 
            id: currentEditId || Date.now(), 
            day: currentDay, 
            time: document.getElementById('m-time').value, 
            title: document.getElementById('m-title').value, 
            type: document.getElementById('m-type').value, 
            cost: document.getElementById('m-cost').value, 
            payer: document.getElementById('m-payer').value, 
            url: document.getElementById('m-url').value, 
            note: document.getElementById('m-note').value 
        };
        closeModal();
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
        fetchData();
    }
    
    async function deleteData() { if(!confirm('確認從雲端刪除？')) return; closeModal(); await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "delete", id: currentEditId }) }); fetchData(); }

    window.onload = () => {
        const s = localStorage.getItem('prefFS');
        if (s) { fontSize = parseInt(s); document.documentElement.style.fontSize = fontSize + 'px'; }
        setDay(1);
        fetchData();
    };
</script>
</body>
</html>
