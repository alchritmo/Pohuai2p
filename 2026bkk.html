<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THAI.26 | 旅遊儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding-bottom: 50px; }
        .day-card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .map-btn { display: inline-block; background: #4285F4; color: white; padding: 4px 12px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: bold; }
        .expense-section { background: #e8f5e9; padding: 20px; border-radius: 15px; border: 1px solid #c8e6c9; }
        .sync-tag { font-size: 10px; color: #999; text-align: right; margin-bottom: 5px; }
        .drag-handle { cursor: grab; color: #ccc; padding-right: 10px; }
        .payer-common { color: #f59e0b; }
        .payer-me { color: #6366f1; }
        .payer-partner { color: #ec4899; }
        /* 隱藏原生滾輪樣式但保留功能 */
        input[type="time"] { border: 1px solid #ddd; border-radius: 4px; padding: 2px 5px; }
    </style>
</head>
<body>

<div class="max-w-md mx-auto p-4">
    <div class="flex justify-between items-end mb-4">
        <h2 class="text-2xl font-bold text-slate-800">📍 泰國旅遊儀表板</h2>
        <div id="sync-status" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">● 雲端同步中</div>
    </div>

    <div id="itinerary-list">
        <p class="text-center py-10 text-slate-400">正在讀取雲端行程...</p>
    </div>

    <div class="expense-section mt-8">
        <h3 class="text-lg font-bold mb-3 flex items-center gap-2">💰 快速記帳 (共同支出)</h3>
        <div class="space-y-2">
            <input type="text" id="ex-item" placeholder="項目名稱 (如：午餐)" class="w-full p-3 border-none rounded-lg shadow-sm">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="ex-amount" placeholder="金額 (THB)" class="p-3 border-none rounded-lg shadow-sm">
                <select id="ex-payer" class="p-3 border-none rounded-lg shadow-sm font-bold text-indigo-600 bg-white">
                    <option value="共同">共同支付</option>
                    <option value="博懷">博懷付</option>
                    <option value="阿正">阿正付</option>
                </select>
            </div>
            <button onclick="addExpenseFromForm()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg shadow-md active:scale-95 transition-all">新增紀錄</button>
        </div>

        <table class="w-full mt-6 text-sm">
            <thead class="text-slate-500 border-b">
                <tr><th class="py-2 text-left">項目</th><th class="py-2 text-center">付款</th><th class="py-2 text-right">金額</th></tr>
            </thead>
            <tbody id="expense-tbody">
                </tbody>
        </table>
        
        <div class="mt-4 pt-4 border-t border-green-200 space-y-1">
            <div class="flex justify-between text-sm"><span>博懷小計:</span><span id="sum-b">0</span></div>
            <div class="flex justify-between text-sm"><span>阿正小計:</span><span id="sum-a">0</span></div>
            <div class="flex justify-between font-bold text-indigo-600"><span>總計 (含共同):</span><span id="sum-total">0</span></div>
        </div>
    </div>
</div>

<div id="modal" class="fixed inset-0 bg-black/50 hidden z-[200] flex items-center justify-center p-6">
    <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
        <h3 class="font-bold text-lg mb-4">修改行程</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="edit-title" class="w-full p-3 border rounded-lg mb-3" placeholder="行程名稱">
        <div class="grid grid-cols-2 gap-2 mb-3">
            <input type="time" id="edit-time" class="p-3 border rounded-lg">
            <select id="edit-payer" class="p-3 border rounded-lg">
                <option value="共同">共同</option><option value="博懷">博懷</option><option value="阿正">阿正</option>
            </select>
        </div>
        <input type="number" id="edit-cost" class="w-full p-3 border rounded-lg mb-3" placeholder="金額">
        <div class="flex gap-2">
            <button onclick="closeModal()" class="flex-1 bg-slate-100 py-3 rounded-xl font-bold">取消</button>
            <button onclick="saveEdit()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">儲存</button>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyTRAUKi7Uo8Mn0ih_q9qx4LBHM_6nwGIb6MLK1n1z46p4WcP9sMpLeuGS3utgMNQ19ZA/exec";
    let tripData = [];

    // 初始化讀取
    async function init() {
        document.getElementById('sync-status').innerText = "● 雲端讀取中...";
        try {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            tripData = await res.json();
            renderAll();
        } catch (e) {
            console.error(e);
        } finally {
            document.getElementById('sync-status').innerText = "● 雲端已同步";
        }
    }

    function renderAll() {
        renderItinerary();
        renderExpenses();
    }

    // 渲染行程 (按天數分組卡片)
    function renderItinerary() {
        const list = document.getElementById('itinerary-list');
        list.innerHTML = '';
        
        // 取得所有天數並排序
        const days = [...new Set(tripData.map(item => parseInt(item.Day)))].sort((a,b) => a-b);

        days.forEach(day => {
            const dayCard = document.createElement('div');
            dayCard.className = "day-card";
            dayCard.innerHTML = `<h3 class="font-black text-indigo-600 border-b pb-2 mb-3">Day ${day}</h3>`;
            
            const ul = document.createElement('ul');
            ul.className = "space-y-4";
            ul.id = `day-list-${day}`;

            const items = tripData.filter(item => parseInt(item.Day) === day);
            items.forEach(item => {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between group";
                li.dataset.id = item.ID;
                
                const timeStr = item.Time ? (String(item.Time).includes('T') ? item.Time.split('T')[1].substring(0, 5) : String(item.Time).substring(0, 5)) : '--:--';
                const payerClass = item.Payer === '共同' ? 'payer-common' : (item.Payer === '博懷' ? 'payer-me' : 'payer-partner');

                li.innerHTML = `
                    <div class="flex items-center flex-1" onclick='openModal(${JSON.stringify(item)})'>
                        <span class="drag-handle">☰</span>
                        <div>
                            <span class="text-[10px] font-bold text-slate-300 mr-2">${timeStr}</span>
                            <span class="font-bold text-slate-700">${item.Title}</span>
                            <div class="text-[9px] font-bold ${payerClass}">${item.Payer || ''} ${item.Cost ? '฿'+item.Cost : ''}</div>
                        </div>
                    </div>
                    <a class="map-btn" href="${item.URL || 'https://www.google.com/maps/search/' + encodeURIComponent(item.Title + ' Thailand')}" target="_blank">導航</a>
                `;
                ul.appendChild(li);
            });
            dayCard.appendChild(ul);
            list.appendChild(dayCard);

            // 啟用每一天的拖拽排序
            new Sortable(ul, {
                handle: '.drag-handle',
                animation: 150,
                onEnd: async () => {
                    const sortedIds = Array.from(ul.children).map(el => el.dataset.id);
                    syncAction({ action: "reorder", ids: sortedIds, day: day });
                }
            });
        });
    }

    // 渲染記帳清單與統計
    function renderExpenses() {
        const tbody = document.getElementById('expense-tbody');
        tbody.innerHTML = '';
        let total = 0, b = 0, a = 0, common = 0;

        // 篩選有金額的項目
        const expenses = tripData.filter(item => item.Cost && parseFloat(item.Cost) > 0);

        expenses.forEach(ex => {
            const cost = parseFloat(ex.Cost);
            const payerClass = ex.Payer === '共同' ? 'payer-common' : (ex.Payer === '博懷' ? 'payer-me' : 'payer-partner');
            total += cost;
            if (ex.Payer === '博懷') b += cost;
            else if (ex.Payer === '阿正') a += cost;
            else common += cost;

            tbody.innerHTML += `
                <tr class="border-b border-green-100">
                    <td class="py-2 font-medium">${ex.Title}</td>
                    <td class="py-2 text-center text-[10px] font-bold ${payerClass}">${ex.Payer}</td>
                    <td class="py-2 text-right font-black italic">฿${cost.toLocaleString()}</td>
                </tr>
            `;
        });

        document.getElementById('sum-b').innerText = `฿${b.toLocaleString()}`;
        document.getElementById('sum-a').innerText = `฿${a.toLocaleString()}`;
        document.getElementById('sum-total').innerText = `฿${total.toLocaleString()} (含共同 ฿${common.toLocaleString()})`;
    }

    // 新增記帳 (快捷鍵)
    async function addExpenseFromForm() {
        const title = document.getElementById('ex-item').value;
        const cost = document.getElementById('ex-amount').value;
        const payer = document.getElementById('ex-payer').value;
        if (!title || !cost) return alert("請填寫項目與金額");

        const payload = { action: "add", day: 1, title, cost, payer, id: Date.now() };
        await syncAction(payload);
        document.getElementById('ex-item').value = '';
        document.getElementById('ex-amount').value = '';
    }

    // Modal 控制
    function openModal(item) {
        document.getElementById('edit-id').value = item.ID;
        document.getElementById('edit-title').value = item.Title;
        document.getElementById('edit-time').value = item.Time ? String(item.Time).substring(0, 5) : "";
        document.getElementById('edit-cost').value = item.Cost || "";
        document.getElementById('edit-payer').value = item.Payer || "共同";
        document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    async function saveEdit() {
        const payload = {
            action: "update",
            id: document.getElementById('edit-id').value,
            title: document.getElementById('edit-title').value,
            time: document.getElementById('edit-time').value,
            cost: document.getElementById('edit-cost').value,
            payer: document.getElementById('edit-payer').value
        };
        closeModal();
        await syncAction(payload);
    }

    // 核心同步函式
    async function syncAction(payload) {
        document.getElementById('sync-status').innerText = "● 雲端同步中...";
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
        await init(); // 重新讀取資料
    }

    window.onload = init;
</script>
</body>
</html>
