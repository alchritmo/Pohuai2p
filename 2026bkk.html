<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THAI.26 | 極簡導路</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #F8FAFC; }
        body { font-family: "PingFang TC", sans-serif; background: var(--bg); -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass-header { background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; }
        .tab-btn.active { background: var(--primary); color: white !important; font-weight: 900; }
        .plan-card { transition: all 0.2s; border: 1px solid #f1f5f9; }
        .drag-handle { cursor: grab; color: #cbd5e1; padding: 0 10px; font-size: 16px; }
        .tag { font-size: 8px; font-weight: 800; padding: 1px 6px; border-radius: 4px; text-transform: uppercase; }
        .tag-flight { background: #fff7ed; color: #c2410c; }
        .tag-transport { background: #f1f5f9; color: #475569; }
        .tag-spot { background: #f0fdf4; color: #166534; }
        .tag-food { background: #fef2f2; color: #991b1b; }
        .tag-hotel { background: #eef2ff; color: #3730a3; }
        .cost-trigger { transition: all 0.2s; border: 1px dashed transparent; }
        .cost-trigger:active { transform: scale(0.9); background: #eef2ff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-900">

<div id="status-bar" class="fixed top-0 w-full z-[150] bg-indigo-950 text-white px-4 py-1 text-[10px] font-bold flex justify-between hidden">
    <span id="flight-info">✈️ 載入中...</span>
    <span id="terminal-info">T2</span>
</div>

<header id="main-nav" class="glass-header fixed w-full z-[140]">
    <div class="px-4 py-3 flex justify-between items-center">
        <h1 class="font-black text-xl italic text-indigo-600 tracking-tighter" onclick="location.reload()">THAI.26</h1>
        <button onclick="switchView('stats')" id="view-btn" class="text-[11px] font-bold bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-xl">花費統計</button>
    </div>
    <div class="flex gap-2 px-4 pb-3 overflow-x-auto no-scrollbar">
        <button onclick="setDay(1)" id="tab-1" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-xl text-xs font-bold bg-white text-slate-400 border border-slate-100">D1 3/19</button>
        <button onclick="setDay(2)" id="tab-2" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-xl text-xs font-bold bg-white text-slate-400 border border-slate-100">D2 3/20</button>
        <button onclick="setDay(3)" id="tab-3" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-xl text-xs font-bold bg-white text-slate-400 border border-slate-100">D3 3/21</button>
        <button onclick="setDay(4)" id="tab-4" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-xl text-xs font-bold bg-white text-slate-400 border border-slate-100">D4 3/22</button>
        <button onclick="setDay(5)" id="tab-5" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-xl text-xs font-bold bg-white text-slate-400 border border-slate-100">D5 3/23</button>
        <button onclick="setDay(6)" id="tab-6" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-xl text-xs font-bold bg-white text-slate-400 border border-slate-100">D6 3/24</button>
    </div>
</header>

<main id="view-list" class="pt-32 px-4 pb-24 space-y-2">
    <div id="plan-container" class="space-y-1.5"></div>
</main>

<main id="view-stats" class="hidden pt-32 px-4 pb-24 space-y-4">
    <div class="bg-indigo-600 rounded-3xl p-6 text-white shadow-lg">
        <p class="text-[10px] font-bold opacity-70 mb-1 uppercase">Total Cost</p>
        <h2 id="stats-total" class="text-3xl font-black italic">฿0</h2>
        <div class="grid grid-cols-2 gap-4 mt-4 pt-4 border-t border-indigo-400/50 text-[11px] font-bold">
            <div>博懷：<span id="stats-b">฿0</span></div>
            <div>阿正：<span id="stats-a">฿0</span></div>
        </div>
    </div>
    <div id="cat-list" class="space-y-1"></div>
</main>

<button onclick="openAddModal()" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl z-[160]">+</button>

<div id="quick-cost-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden z-[300]" onclick="closeQuickCost()"></div>
<div id="quick-cost-modal" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80%] bg-white rounded-3xl z-[310] p-6 shadow-2xl hidden">
    <h4 class="text-sm font-bold text-slate-500 mb-4" id="quick-cost-title">快速記帳</h4>
    <div class="flex gap-2">
        <input type="number" id="quick-cost-input" class="flex-1 bg-slate-100 p-4 rounded-2xl outline-none font-black text-2xl text-indigo-600" placeholder="0" autofocus>
        <button onclick="submitQuickCost()" class="bg-indigo-600 text-white px-6 rounded-2xl font-bold">OK</button>
    </div>
</div>

<div id="modal-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-[200]" onclick="closeModal()"></div>
<div id="modal" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] z-[210] translate-y-full transition-transform duration-300 p-6 pb-10 shadow-2xl max-h-[85vh] overflow-y-auto">
    <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
    <div class="flex justify-between items-center mb-6">
        <h3 id="modal-title" class="font-black text-xl">編輯行程</h3>
        <button onclick="deleteData()" id="btn-delete" class="text-red-500 text-[10px] font-bold bg-red-50 px-3 py-1 rounded-lg">刪除</button>
    </div>
    <div class="space-y-4">
        <input type="text" id="m-title" placeholder="項目名稱" class="w-full bg-slate-50 p-4 rounded-xl outline-none font-bold border">
        <div class="grid grid-cols-2 gap-3">
            <input type="time" id="m-time" class="w-full bg-slate-50 p-4 rounded-xl outline-none font-bold border">
            <select id="m-type" class="w-full bg-slate-50 p-4 rounded-xl outline-none font-bold text-indigo-600 border">
                <option value="spot">景點</option><option value="food">美食</option><option value="transport">交通</option><option value="hotel">飯店</option><option value="flight">航班</option>
            </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <input type="number" id="m-cost" placeholder="金額 THB" class="w-full bg-slate-50 p-4 rounded-xl outline-none font-black text-indigo-600 border">
            <select id="m-payer" class="w-full bg-slate-50 p-4 rounded-xl outline-none font-bold border">
                <option value="博懷">博懷</option><option value="阿正">阿正</option>
            </select>
        </div>
        <input type="text" id="m-url" placeholder="地圖/網頁連結" class="w-full bg-slate-50 p-4 rounded-xl outline-none text-xs text-blue-500 border">
        <textarea id="m-note" placeholder="備註" class="w-full bg-slate-50 p-4 rounded-xl outline-none h-20 text-sm border"></textarea>
        <button onclick="saveData()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg">儲存並同步</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyTRAUKi7Uo8Mn0ih_q9qx4LBHM_6nwGIb6MLK1n1z46p4WcP9sMpLeuGS3utgMNQ19ZA/exec";
    let allData = [];
    let currentDay = 1;
    let currentEditId = null;
    let quickCostPlan = null;

    const TYPE_CH = { spot: '景點', food: '美食', transport: '交通', hotel: '飯店', flight: '航班' };

    function formatTime(t) {
        if (!t) return "";
        let s = String(t);
        let time = s.includes('T') ? s.split('T')[1].substring(0, 5) : s.substring(0, 5);
        if (time.length === 4 && time.includes(':')) time = '0' + time;
        return time;
    }

    async function fetchData() {
        const res = await fetch(GAS_URL);
        allData = await res.json();
        render();
        calcStats();
    }

    function setDay(d) {
        currentDay = d;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${d}`).classList.add('active');
        const statusBar = document.getElementById('status-bar');
        const mainNav = document.getElementById('main-nav');
        if (d === 1 || d === 6) {
            statusBar.classList.remove('hidden');
            mainNav.style.top = "26px";
            document.getElementById('flight-info').innerText = d === 1 ? "✈️ JX741 (09:25) 櫃檯: T2-6" : "✈️ JX742 (13:45) 返台行程";
        } else {
            statusBar.classList.add('hidden');
            mainNav.style.top = "0";
        }
        render();
    }

    function render() {
        const container = document.getElementById('plan-container');
        container.innerHTML = '';
        const dailyPlans = allData.filter(p => p.Day == currentDay);

        dailyPlans.forEach(plan => {
            const card = document.createElement('div');
            card.dataset.id = plan.ID;
            card.className = "plan-card bg-white p-3 rounded-2xl shadow-sm flex items-center";
            
            const costText = plan.Cost ? `฿${parseInt(plan.Cost).toLocaleString()}` : `<span class="text-slate-300 font-normal text-[10px]">+฿</span>`;
            
            card.innerHTML = `
                <div class="drag-handle">☰</div>
                <div class="flex-1" onclick="openEditModal(${JSON.stringify(plan).replace(/"/g, '"')})">
                    <div class="flex items-center gap-2 mb-0.5">
                        <span class="tag tag-${plan.Type || 'spot'}">${TYPE_CH[plan.Type] || '景點'}</span>
                        <span class="text-[9px] font-black text-slate-300 uppercase">${formatTime(plan.Time)}</span>
                    </div>
                    <h3 class="font-bold text-slate-800 text-sm leading-tight">${plan.Title}</h3>
                </div>
                <div class="flex items-center gap-3">
                    <div onclick="event.stopPropagation(); openQuickCost(${JSON.stringify(plan).replace(/"/g, '"')})" class="cost-trigger text-right px-2 py-1 rounded-lg">
                        <p class="text-[11px] font-black text-indigo-600">${costText}</p>
                        ${plan.Payer ? `<p class="text-[7px] font-bold text-slate-300 text-center uppercase">${plan.Payer}</p>` : ''}
                    </div>
                    <button onclick="event.stopPropagation(); window.open('${plan.URL || 'https://www.google.com/maps/search/?api=1&query=$' + encodeURIComponent(plan.Title + " Thailand")}')" class="p-2 bg-indigo-50 text-indigo-600 rounded-xl">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                    </button>
                </div>
            `;
            container.appendChild(card);
        });

        new Sortable(container, {
            handle: '.drag-handle', animation: 150, ghostClass: 'bg-slate-50',
            onEnd: async () => {
                const ids = Array.from(container.children).map(c => c.dataset.id);
                await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "reorder", ids: ids, day: currentDay }) });
            }
        });
    }

    // 快速修改金額邏輯
    function openQuickCost(plan) {
        quickCostPlan = plan;
        document.getElementById('quick-cost-title').innerText = `修改「${plan.Title}」金額`;
        document.getElementById('quick-cost-input').value = plan.Cost || "";
        document.getElementById('quick-cost-overlay').classList.remove('hidden');
        document.getElementById('quick-cost-modal').classList.remove('hidden');
        document.getElementById('quick-cost-input').focus();
    }
    function closeQuickCost() {
        document.getElementById('quick-cost-overlay').classList.add('hidden');
        document.getElementById('quick-cost-modal').classList.add('hidden');
    }
    async function submitQuickCost() {
        const newCost = document.getElementById('quick-cost-input').value;
        closeQuickCost();
        const payload = { ...quickCostPlan, action: "update", cost: newCost };
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
        fetchData();
    }

    function switchView(v) {
        const isStats = v === 'stats';
        document.getElementById('view-list').classList.toggle('hidden', isStats);
        document.getElementById('view-stats').classList.toggle('hidden', !isStats);
        document.getElementById('view-btn').innerText = isStats ? "返回行程" : "花費統計";
    }

    function calcStats() {
        let total = 0, b = 0, a = 0;
        allData.forEach(p => {
            const cost = parseFloat(p.Cost) || 0;
            total += cost;
            if (p.Payer === "博懷") b += cost;
            if (p.Payer === "阿正") a += cost;
        });
        document.getElementById('stats-total').innerText = `฿${total.toLocaleString()}`;
        document.getElementById('stats-b').innerText = `฿${b.toLocaleString()}`;
        document.getElementById('stats-a').innerText = `฿${a.toLocaleString()}`;
    }

    function openEditModal(p) {
        currentEditId = p.ID;
        document.getElementById('m-title').value = p.Title;
        document.getElementById('m-time').value = formatTime(p.Time);
        document.getElementById('m-type').value = p.Type || 'spot';
        document.getElementById('m-cost').value = p.Cost || "";
        document.getElementById('m-payer').value = p.Payer || "博懷";
        document.getElementById('m-url').value = p.URL || "";
        document.getElementById('m-note').value = p.Note || "";
        document.getElementById('btn-delete').style.display = "block";
        showModal();
    }
    function openAddModal() { currentEditId = null; document.getElementById('m-title').value = ""; document.getElementById('btn-delete').style.display = "none"; showModal(); }
    function showModal() { document.getElementById('modal-overlay').classList.remove('hidden'); document.getElementById('modal').classList.remove('translate-y-full'); }
    function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); document.getElementById('modal').classList.add('translate-y-full'); }
    async function saveData() {
        const payload = { action: currentEditId ? "update" : "add", id: currentEditId || Date.now(), day: currentDay, time: document.getElementById('m-time').value, title: document.getElementById('m-title').value, type: document.getElementById('m-type').value, cost: document.getElementById('m-cost').value, payer: document.getElementById('m-payer').value, url: document.getElementById('m-url').value, note: document.getElementById('m-note').value };
        closeModal();
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
        fetchData();
    }
    async function deleteData() { if(!confirm("確定刪除？")) return; closeModal(); await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "delete", id: currentEditId }) }); fetchData(); }

    window.onload = () => { setDay(1); fetchData(); };
</script>
</body>
</html>
