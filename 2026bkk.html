<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇹🇭 2026 泰國行儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .card-flight { border-left: 5px solid #fbbf24; }
        .card-hotel { border-left: 5px solid #60a5fa; }
        .card-spot { border-left: 5px solid #34d399; }
        .card-food { border-left: 5px solid #f87171; }
        .card-transport { border-left: 5px solid #94a3b8; }
        @media (max-width: 640px) { .day-col { width: 100%; margin-bottom: 1.5rem; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

<nav class="bg-white p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center border-b">
    <div>
        <h1 class="font-black text-slate-800 tracking-tight text-lg">2026 THAI TRAVEL</h1>
        <p class="text-[10px] text-slate-400">同步狀態：<span id="sync-status">確認中...</span></p>
    </div>
    <span id="loader" class="text-blue-500 hidden animate-spin">🌀</span>
</nav>

<main class="p-4 flex gap-4 overflow-x-auto" id="board">
    </main>

<div id="modal" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
        <h3 class="font-bold mb-4 text-slate-800">新增行程卡片</h3>
        <div class="space-y-3">
            <input type="text" id="in-title" placeholder="活動名稱 (例: 鄭王廟)" class="w-full bg-slate-100 p-3 rounded-xl outline-none">
            <div class="flex gap-2">
                <input type="text" id="in-time" placeholder="時間 (例: 15:00)" class="w-1/2 bg-slate-100 p-3 rounded-xl">
                <select id="in-day" class="w-1/2 bg-slate-100 p-3 rounded-xl">
                    <option value="1">Day 1 (3/19)</option><option value="2">Day 2 (3/20)</option>
                    <option value="3">Day 3 (3/21)</option><option value="4">Day 4 (3/22)</option>
                    <option value="5">Day 5 (3/23)</option><option value="6">Day 6 (3/24)</option>
                </select>
            </div>
            <select id="in-type" class="w-full bg-slate-100 p-3 rounded-xl">
                <option value="spot">景點</option><option value="food">美食</option>
                <option value="hotel">飯店</option><option value="flight">航班</option>
                <option value="transport">交通</option>
            </select>
            <input type="text" id="in-url" placeholder="Google Maps 或 網頁連結" class="w-full bg-slate-100 p-3 rounded-xl">
            <textarea id="in-note" placeholder="備註 (如: 訂單編號)" class="w-full bg-slate-100 p-3 rounded-xl"></textarea>
        </div>
        <div class="flex gap-2 mt-6">
            <button onclick="closeModal()" class="flex-1 py-3 text-slate-400 font-bold">取消</button>
            <button onclick="addData()" class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold">同步到 Sheet</button>
        </div>
    </div>
</div>

<button onclick="openModal()" class="fixed bottom-6 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-xl text-3xl font-light z-50 flex items-center justify-center">+</button>

<script>
    // 已串接你的專屬 GAS URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyTRAUKi7Uo8Mn0ih_q9qx4LBHM_6nwGIb6MLK1n1z46p4WcP9sMpLeuGS3utgMNQ19ZA/exec";

    async function loadData() {
        showLoader(true);
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            render(data);
            document.getElementById('sync-status').innerText = "連線正常";
            document.getElementById('sync-status').className = "text-green-500";
        } catch (e) {
            document.getElementById('sync-status').innerText = "連線失敗";
            document.getElementById('sync-status').className = "text-red-500";
        }
        showLoader(false);
    }

    function render(data) {
        const board = document.getElementById('board');
        board.innerHTML = '';
        const dayLabels = ["3/19 (四)", "3/20 (五)", "3/21 (六)", "3/22 (日)", "3/23 (一)", "3/24 (二)"];
        
        dayLabels.forEach((label, i) => {
            const dayNum = i + 1;
            const col = document.createElement('div');
            col.className = "day-col flex-shrink-0 w-80";
            col.innerHTML = `<h2 class="font-black text-slate-400 mb-4 px-2 italic text-sm tracking-widest">${label}</h2><div id="day-${dayNum}" class="space-y-4"></div>`;
            board.appendChild(col);

            data.filter(d => d.Day == dayNum).forEach(item => {
                const card = document.createElement('div');
                card.className = `bg-white p-5 rounded-3xl shadow-sm border border-slate-100 card-${item.Type || 'spot'} transition-transform active:scale-95`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold text-slate-300 tracking-tighter">${item.Time}</span>
                        <div class="flex gap-3">
                            ${item.URL ? `<button onclick="window.open('${item.URL}')" class="text-blue-500 text-[10px] font-black uppercase">Link</button>` : ''}
                            <button onclick="deleteData('${item.ID}')" class="text-slate-200 text-[10px]">✕</button>
                        </div>
                    </div>
                    <h4 class="font-bold text-slate-800 text-sm leading-snug">${item.Title}</h4>
                    ${item.Note ? `<p class="text-[10px] text-slate-400 mt-3 leading-relaxed bg-slate-50 p-2 rounded-lg">${item.Note}</p>` : ''}
                `;
                document.getElementById(`day-${dayNum}`).appendChild(card);
            });
        });
    }

    async function addData() {
        const payload = {
            action: "add",
            day: document.getElementById('in-day').value,
            time: document.getElementById('in-time').value,
            title: document.getElementById('in-title').value,
            url: document.getElementById('in-url').value,
            note: document.getElementById('in-note').value,
            type: document.getElementById('in-type').value
        };
        showLoader(true);
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
        closeModal();
        loadData();
    }

    async function deleteData(id) {
        if(!confirm('確定要從 Google Sheet 移除此項？')) return;
        showLoader(true);
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "delete", id: id }) });
        loadData();
    }

    function showLoader(show) { document.getElementById('loader').classList.toggle('hidden', !show); }
    function openModal() { document.getElementById('modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    window.onload = loadData;
</script>
</body>
</html>
