<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THAI 2026 DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-day { color: #000; font-weight: 800; border-bottom: 2px solid #000; }
        .bottom-drawer { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        .tag { font-size: 9px; padding: 2px 8px; border-radius: 4px; font-weight: 800; letter-spacing: 0.05em; }
        .bg-flight { background: #fee2e2; color: #ef4444; }
        .bg-hotel { background: #dcfce7; color: #22c55e; }
        .bg-food { background: #fef9c3; color: #ca8a04; }
        .bg-spot { background: #e0f2fe; color: #0ea5e9; }
        .bg-transport { background: #f3f4f6; color: #6b7280; }
    </style>
</head>
<body class="bg-white text-black selection:bg-black selection:text-white">

<nav class="fixed top-0 w-full bg-white/80 backdrop-blur-md z-[100] border-b border-gray-100">
    <div class="px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-extrabold tracking-tighter">THAI.26</h1>
        <div class="flex bg-gray-100 rounded-full p-1 scale-90">
            <button onclick="switchView('list')" id="btn-list" class="px-6 py-1.5 rounded-full text-xs font-bold transition-all bg-black text-white shadow-lg">PLAN</button>
            <button onclick="switchView('stats')" id="btn-stats" class="px-6 py-1.5 rounded-full text-xs font-bold transition-all text-gray-400">BILL</button>
        </div>
    </div>
    
    <div id="day-nav" class="flex gap-8 px-6 pb-2 overflow-x-auto no-scrollbar border-t border-gray-50 pt-3">
        <button onclick="setDay(1)" class="day-tab flex-shrink-0 text-sm text-gray-300 pb-2" id="tab-1">MAR 19</button>
        <button onclick="setDay(2)" class="day-tab flex-shrink-0 text-sm text-gray-300 pb-2" id="tab-2">MAR 20</button>
        <button onclick="setDay(3)" class="day-tab flex-shrink-0 text-sm text-gray-300 pb-2" id="tab-3">MAR 21</button>
        <button onclick="setDay(4)" class="day-tab flex-shrink-0 text-sm text-gray-300 pb-2" id="tab-4">MAR 22</button>
        <button onclick="setDay(5)" class="day-tab flex-shrink-0 text-sm text-gray-300 pb-2" id="tab-5">MAR 23</button>
        <button onclick="setDay(6)" class="day-tab flex-shrink-0 text-sm text-gray-300 pb-2" id="tab-6">MAR 24</button>
    </div>
</nav>

<main id="view-list" class="pt-32 p-6 space-y-8 pb-32">
    <div id="card-container" class="space-y-6">
        </div>
</main>

<main id="view-stats" class="pt-24 p-6 hidden space-y-8 pb-32">
    <div class="bg-black rounded-3xl p-8 text-white">
        <p class="text-[10px] font-bold text-gray-500 tracking-widest mb-2 uppercase">Current Spending</p>
        <h2 id="grand-total" class="text-5xl font-extrabold mb-10 tracking-tighter">฿0</h2>
        <div class="space-y-6 border-t border-gray-800 pt-8">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-gray-500 font-bold mb-1">博懷 (Bohuai)</p>
                    <p id="total-bohuai" class="text-2xl font-bold italic">฿0</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-gray-500 font-bold mb-1">阿正 (Azheng)</p>
                    <p id="total-azheng" class="text-2xl font-bold italic">฿0</p>
                </div>
            </div>
        </div>
    </div>
    <div id="category-stats" class="space-y-4"></div>
</main>

<div id="modal-overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm hidden z-[200]" onclick="closeModal()"></div>
<div id="modal" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[3rem] z-[210] bottom-drawer translate-y-full p-8 pb-16 shadow-2xl overflow-y-auto max-h-[85vh]">
    <div class="w-16 h-1 bg-gray-100 rounded-full mx-auto mb-8"></div>
    <div class="flex justify-between items-center mb-8">
        <h3 id="modal-title" class="text-2xl font-extrabold">EDIT</h3>
        <button onclick="deleteData()" id="btn-delete" class="text-red-500 font-bold text-xs">REMOVE</button>
    </div>
    
    <div class="space-y-6">
        <input type="text" id="m-title" placeholder="What's next?" class="w-full text-xl font-bold border-b border-gray-100 py-3 outline-none focus:border-black transition-colors">
        
        <div class="grid grid-cols-2 gap-6">
            <input type="text" id="m-time" placeholder="00:00" class="bg-gray-50 p-4 rounded-2xl text-center font-bold">
            <select id="m-type" class="bg-gray-50 p-4 rounded-2xl font-bold appearance-none text-center">
                <option value="spot">PLAY</option><option value="food">EAT</option>
                <option value="transport">MOVE</option><option value="hotel">STAY</option><option value="flight">FLY</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-6">
            <input type="number" id="m-cost" placeholder="THB" class="bg-gray-50 p-4 rounded-2xl text-center font-bold">
            <select id="m-payer" class="bg-black text-white p-4 rounded-2xl font-bold appearance-none text-center">
                <option value="博懷">博懷</option><option value="阿正">阿正</option><option value="無">NONE</option>
            </select>
        </div>

        <input type="text" id="m-url" placeholder="Paste Map Link" class="w-full text-xs text-blue-500 border-b border-gray-100 py-2 outline-none">
        <textarea id="m-note" placeholder="Any details..." class="w-full bg-gray-50 p-4 rounded-2xl h-24 text-sm outline-none"></textarea>
        
        <button onclick="saveData()" class="w-full bg-black text-white py-5 rounded-2xl font-bold tracking-widest active:scale-95 transition-all">SYNC TO SHEET</button>
    </div>
</div>

<button onclick="openAddModal()" class="fixed bottom-10 right-8 bg-black text-white w-14 h-14 rounded-full shadow-2xl z-50 flex items-center justify-center active:scale-90 transition-all">
    <span class="text-2xl">+</span>
</button>

<div class="fixed bottom-4 left-6 flex gap-4 z-50 opacity-10">
    <button onclick="changeFontSize(-1)" class="text-xs">A-</button>
    <button onclick="changeFontSize(1)" class="text-xs">A+</button>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyTRAUKi7Uo8Mn0ih_q9qx4LBHM_6nwGIb6MLK1n1z46p4WcP9sMpLeuGS3utgMNQ19ZA/exec";
    let allData = [];
    let currentDay = 1;
    let currentEditId = null;

    // 時間格式修正邏輯
    function formatTime(t) {
        if (!t) return "00:00";
        const str = String(t);
        if (str.includes('T')) return str.split('T')[1].substring(0, 5);
        if (str.length > 8) return str.substring(0, 5);
        return str;
    }

    async function fetchData() {
        const res = await fetch(GAS_URL);
        allData = await res.json();
        render();
        calcStats();
    }

    function setDay(d) {
        currentDay = d;
        document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active-day'));
        document.getElementById(`tab-${d}`).classList.add('active-day');
        render();
    }

    function render() {
        const container = document.getElementById('card-container');
        container.innerHTML = '';
        const filtered = allData.filter(d => d.Day == currentDay);

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = "group active:scale-[0.98] transition-transform";
            card.onclick = () => openEditModal(item);
            
            const cleanTime = formatTime(item.Time);
            card.innerHTML = `
                <div class="flex gap-6">
                    <div class="w-12 pt-1 text-center">
                        <p class="text-[10px] font-black tracking-tighter uppercase mb-1">at</p>
                        <p class="text-xs font-bold">${cleanTime}</p>
                    </div>
                    <div class="flex-1 border-l border-gray-100 pl-6 pb-8 relative">
                        <div class="absolute -left-[4.5px] top-2 w-2 h-2 rounded-full bg-black"></div>
                        <div class="mb-2">
                            <span class="tag bg-${item.Type || 'spot'}">${item.Type || 'spot'}</span>
                        </div>
                        <h4 class="text-lg font-extrabold tracking-tight">${item.Title}</h4>
                        ${item.Note ? `<p class="text-xs text-gray-400 mt-2 font-medium italic">${item.Note}</p>` : ''}
                        <div class="mt-4 flex justify-between items-center">
                            ${item.Cost ? `<span class="text-xs font-bold">฿${parseInt(item.Cost).toLocaleString()} <span class="text-[8px] text-gray-300">/ ${item.Payer}</span></span>` : '<span></span>'}
                            ${item.URL ? `<button onclick="event.stopPropagation(); window.open('${item.URL}')" class="text-[10px] font-black underline underline-offset-4">GO MAP</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
        new Sortable(container, { animation: 150 });
    }

    function calcStats() {
        let b = 0, a = 0, total = 0;
        const cats = {};
        allData.forEach(d => {
            const c = parseFloat(d.Cost) || 0;
            total += c;
            if (d.Payer === '博懷') b += c;
            if (d.Payer === '阿正') a += c;
            if (c > 0) {
                const type = d.Type || 'spot';
                cats[type] = (cats[type] || 0) + c;
            }
        });
        document.getElementById('grand-total').innerText = `฿${total.toLocaleString()}`;
        document.getElementById('total-bohuai').innerText = `฿${b.toLocaleString()}`;
        document.getElementById('total-azheng').innerText = `฿${a.toLocaleString()}`;
        
        const catBox = document.getElementById('category-stats');
        catBox.innerHTML = '';
        Object.entries(cats).forEach(([cat, val]) => {
            const percent = Math.round((val / total) * 100);
            catBox.innerHTML += `
                <div class="flex justify-between items-end pb-4 border-b border-gray-50">
                    <div>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${cat}</p>
                        <p class="text-sm font-bold">฿${val.toLocaleString()}</p>
                    </div>
                    <p class="text-[10px] font-black">${percent}%</p>
                </div>
            `;
        });
    }

    function openEditModal(item) {
        currentEditId = item.ID;
        document.getElementById('m-title').value = item.Title;
        document.getElementById('m-time').value = formatTime(item.Time);
        document.getElementById('m-type').value = item.Type || 'spot';
        document.getElementById('m-cost').value = item.Cost;
        document.getElementById('m-payer').value = item.Payer || '博懷';
        document.getElementById('m-url').value = item.URL;
        document.getElementById('m-note').value = item.Note;
        document.getElementById('btn-delete').style.display = 'block';
        showModal();
    }

    function openAddModal() {
        currentEditId = null;
        document.getElementById('m-title').value = "";
        document.getElementById('btn-delete').style.display = 'none';
        showModal();
    }

    function showModal() {
        document.getElementById('modal-overlay').classList.remove('hidden');
        document.getElementById('modal').classList.remove('translate-y-full');
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.add('hidden');
        document.getElementById('modal').classList.add('translate-y-full');
    }

    async function saveData() {
        const payload = {
            action: currentEditId ? "update" : "add",
            id: currentEditId || Date.now(),
            day: currentDay,
            time: document.getElementById('m-time').value,
            title: document.getElementById('m-title').value,
            type: document.getElementById('m-type').value,
            cost: document.getElementById('m-cost').value,
            payer: document.getElementById('m-payer').value,
            url: document.getElementById('m-url').value,
            note: document.getElementById('m-note').value
        };
        closeModal();
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
        fetchData();
    }

    async function deleteData() {
        if(!confirm('REMOVE FROM SHEET?')) return;
        closeModal();
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "delete", id: currentEditId }) });
        fetchData();
    }

    function switchView(v) {
        const isList = v === 'list';
        document.getElementById('view-list').classList.toggle('hidden', !isList);
        document.getElementById('view-stats').classList.toggle('hidden', isList);
        document.getElementById('day-nav').classList.toggle('hidden', !isList);
        document.getElementById('btn-list').className = isList ? 'px-6 py-1.5 rounded-full text-xs font-bold transition-all bg-black text-white shadow-lg' : 'px-6 py-1.5 rounded-full text-xs font-bold transition-all text-gray-400';
        document.getElementById('btn-stats').className = !isList ? 'px-6 py-1.5 rounded-full text-xs font-bold transition-all bg-black text-white shadow-lg' : 'px-6 py-1.5 rounded-full text-xs font-bold transition-all text-gray-400';
    }

    function changeFontSize(delta) {
        const root = document.documentElement;
        const current = parseFloat(getComputedStyle(root).fontSize);
        root.style.fontSize = (current + delta) + 'px';
    }

    window.onload = () => {
        setDay(1);
        fetchData();
    };
</script>
</body>
</html>
