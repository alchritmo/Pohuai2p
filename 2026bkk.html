<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰國旅遊助手 - 曼谷 & 芭達雅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <header class="bg-blue-600 text-white p-6 shadow-lg rounded-b-[2rem]">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-bold italic tracking-wider">THAI TRIP 2026</h1>
                <p class="text-blue-100 text-sm opacity-80">個人專屬雲端行程助手</p>
            </div>
            <div id="user-status" class="text-[10px] bg-blue-700 px-2 py-1 rounded">連線中...</div>
        </div>
    </header>

    <nav class="flex bg-white mx-4 -mt-4 rounded-xl shadow-md sticky top-4 z-50">
        <button onclick="switchTab('itinerary')" id="tab-itinerary" class="flex-1 py-4 text-sm font-bold tab-active">行程計畫</button>
        <button onclick="switchTab('expenses')" id="tab-expenses" class="flex-1 py-4 text-sm font-bold text-slate-400">隨手記帳</button>
        <button onclick="switchTab('settings')" id="tab-settings" class="flex-1 py-4 text-sm font-bold text-slate-400">管理</button>
    </nav>

    <main class="p-4 mt-4">
        <section id="section-itinerary" class="animate-pop">
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-4" id="day-selector"></div>
            <div id="itinerary-list" class="space-y-3"></div>
        </section>

        <section id="section-expenses" class="hidden animate-pop">
            <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 text-center border border-blue-100">
                <p class="text-slate-400 text-xs">目前累計支出</p>
                <div class="text-4xl font-black text-slate-800 my-1">
                    <span class="text-blue-600 text-xl mr-1">฿</span><span id="total-amount">0</span>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm mb-6">
                <div class="flex gap-2">
                    <input id="exp-name" type="text" placeholder="項目" class="flex-1 bg-slate-50 p-3 rounded-lg text-sm outline-none focus:ring-1 ring-blue-400">
                    <input id="exp-price" type="number" placeholder="金額" class="w-24 bg-slate-50 p-3 rounded-lg text-sm outline-none focus:ring-1 ring-blue-400">
                    <button onclick="addExpense()" class="bg-blue-600 text-white px-4 rounded-lg active:scale-95 transition-transform">
                        <i data-lucide="plus"></i>
                    </button>
                </div>
            </div>
            <div id="expense-list" class="space-y-2"></div>
        </section>

        <section id="section-settings" class="hidden animate-pop">
            <div class="bg-white p-6 rounded-2xl space-y-4 shadow-sm">
                <h3 class="font-bold border-b pb-2">管理功能</h3>
                <button onclick="exportJSON()" class="w-full text-left p-4 bg-slate-50 rounded-xl text-sm flex items-center justify-between">
                    <span>導出備份資料 (JSON)</span>
                    <i data-lucide="download" class="w-4 h-4 text-slate-400"></i>
                </button>
                <button onclick="resetToDefault()" class="w-full text-left p-4 bg-red-50 text-red-600 rounded-xl text-sm flex items-center justify-between">
                    <span>重置為原始行程</span>
                    <i data-lucide="refresh-cw" class="w-4 h-4 opacity-50"></i>
                </button>
            </div>
        </section>
    </main>

    <div id="map-fab" class="fixed bottom-6 right-6 z-50">
        <button onclick="openGoogleMaps('Thailand')" class="bg-blue-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform">
            <i data-lucide="map"></i>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置 (請替換為你的實際配置)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // 檢查是否有預注入的環境變數，否則使用上面的 config
        const finalConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
        
        const app = initializeApp(finalConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 初始化全域狀態
        window.appData = { itinerary: [], expenses: [], userId: null };
        let currentDay = 1;

        const defaultItinerary = [
            { day: 1, date: "3/19 (週四)", items: [
                { time: "05:25", title: "搭統聯到機場", loc: "台中統聯", icon: "bus" },
                { time: "09:25", title: "星宇 JX741 起飛", loc: "桃園機場T2", icon: "plane" },
                { time: "16:00", title: "入住 Holiday Inn Express", loc: "Holiday Inn Express Pattaya Central", icon: "hotel", note: "預約編號: 1660580945" },
                { time: "18:27", title: "中天海灘日落", loc: "Jomtien Beach", icon: "sun" }
            ]},
            { day: 2, date: "3/20 (週五)", items: [
                { time: "09:00", title: "The Lunar Beach House", loc: "The Lunar Beach House", icon: "coffee" },
                { time: "19:00", title: "芭達雅步行街", loc: "Walking Street Pattaya", icon: "beer" }
            ]},
            { day: 3, date: "3/21 (週六)", items: [
                { time: "11:00", title: "包車前往曼谷", loc: "Sindhorn Midtown Hotel", icon: "car" },
                { time: "14:00", title: "入住 Sindhorn Midtown", loc: "Sindhorn Midtown Hotel Bangkok", icon: "hotel", note: "預約編號: 1668994448" }
            ]},
            { day: 4, date: "3/22 (週日)", items: [
                { time: "10:00", title: "鄭王廟泰服體驗", loc: "Wat Arun", icon: "camera" },
                { time: "17:00", title: "ICONSIAM", loc: "ICONSIAM", icon: "shopping-bag" }
            ]},
            { day: 5, date: "3/23 (週一)", items: [
                { time: "12:00", title: "龍蝦麵 綠洲", loc: "Oasis Luxury Noodles", icon: "utensils" },
                { time: "19:00", title: "朱拉隆功夜市", loc: "Chulalongkorn Night Market", icon: "map" }
            ]},
            { day: 6, date: "3/24 (週二)", items: [
                { time: "13:45", title: "星宇 JX742 返台", loc: "Suvarnabhumi Airport", icon: "plane" }
            ]}
        ];

        // 初始化
        async function init() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        window.appData.userId = user.uid;
                        document.getElementById('user-status').innerText = `ID: ${user.uid.substring(0,6)}`;
                        syncData(user.uid);
                    }
                });
            } catch (error) {
                console.error("Auth Error:", error);
                document.getElementById('user-status').innerText = "離線模式";
                window.appData.itinerary = defaultItinerary;
                renderAll();
            }
        }

        function syncData(uid) {
            // 使用 UID 作為路徑，確保使用者資料隔離
            const docRef = doc(db, 'user_trips', uid);
            
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    window.appData.itinerary = data.itinerary || defaultItinerary;
                    window.appData.expenses = data.expenses || [];
                } else {
                    window.appData.itinerary = defaultItinerary;
                    setDoc(docRef, { itinerary: defaultItinerary, expenses: [] });
                }
                renderAll();
            });
        }

        window.saveToCloud = async () => {
            if (!window.appData.userId) return;
            const docRef = doc(db, 'user_trips', window.appData.userId);
            await updateDoc(docRef, {
                itinerary: window.appData.itinerary,
                expenses: window.appData.expenses
            });
        };

        // UI 渲染與互動
        window.switchTab = (tab) => {
            ['itinerary', 'expenses', 'settings'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active', 'text-blue-600');
                document.getElementById(`tab-${t}`).classList.add('text-slate-400');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active', 'text-blue-600');
            lucide.createIcons();
        };

        window.renderAll = () => {
            renderDaySelector();
            renderItinerary();
            renderExpenses();
            lucide.createIcons();
        };

        function renderDaySelector() {
            const container = document.getElementById('day-selector');
            container.innerHTML = window.appData.itinerary.map(day => `
                <button onclick="setDay(${day.day})" class="px-5 py-2 rounded-full whitespace-nowrap text-sm font-bold border transition-all ${currentDay === day.day ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-500 border-slate-200'}">
                    Day ${day.day}
                </button>
            `).join('');
        }

        window.setDay = (day) => {
            currentDay = day;
            renderAll();
        };

        function renderItinerary() {
            const dayData = window.appData.itinerary.find(d => d.day === currentDay);
            const container = document.getElementById('itinerary-list');
            if (!dayData) return;

            container.innerHTML = dayData.items.map((item, idx) => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-50 flex items-center gap-4">
                    <div class="min-w-[55px] text-center border-r pr-3">
                        <p class="text-xs font-bold text-blue-600">${item.time}</p>
                    </div>
                    <div class="flex-1">
                        <h4 class="text-sm font-bold text-slate-800">${item.title}</h4>
                        <p class="text-[10px] text-slate-400 flex items-center gap-1">
                            <i data-lucide="map-pin" class="w-3 h-3"></i> ${item.loc}
                        </p>
                        ${item.note ? `<p class="mt-1"><span class="text-[9px] bg-yellow-100 text-yellow-700 px-1.5 py-0.5 rounded italic"># ${item.note}</span></p>` : ''}
                    </div>
                    <button onclick="openGoogleMaps('${item.loc}')" class="p-3 bg-blue-50 text-blue-600 rounded-full active:bg-blue-100">
                        <i data-lucide="navigation" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('') + `
                <button onclick="addItem()" class="w-full p-4 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 text-sm flex items-center justify-center gap-2">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> 新增項目
                </button>
            `;
        }

        function renderExpenses() {
            const list = document.getElementById('expense-list');
            const total = window.appData.expenses.reduce((sum, e) => sum + Number(e.amount), 0);
            document.getElementById('total-amount').innerText = total.toLocaleString();

            list.innerHTML = window.appData.expenses.map((exp, idx) => `
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-sm font-medium text-slate-700">${exp.name}</p>
                        <p class="text-[10px] text-slate-400">${exp.time}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-slate-800 font-mono text-lg">฿${exp.amount}</span>
                        <button onclick="removeExpense(${idx})" class="text-slate-300 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // 功能函數
        window.openGoogleMaps = (loc) => {
            const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}`;
            window.open(url, '_blank');
        };

        window.addExpense = () => {
            const name = document.getElementById('exp-name').value;
            const amount = document.getElementById('exp-price').value;
            if (!name || !amount) return;
            
            window.appData.expenses.unshift({
                name,
                amount: Number(amount),
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false})
            });
            document.getElementById('exp-name').value = '';
            document.getElementById('exp-price').value = '';
            renderExpenses();
            window.saveToCloud();
        };

        window.removeExpense = (idx) => {
            if(confirm("確定刪除此筆記錄？")) {
                window.appData.expenses.splice(idx, 1);
                renderExpenses();
                window.saveToCloud();
                lucide.createIcons();
            }
        };

        window.addItem = () => {
            const title = prompt("項目名稱?");
            const time = prompt("時間? (HH:MM)");
            const loc = prompt("詳細地點/地標?");
            if (title && time && loc) {
                const dayIdx = window.appData.itinerary.findIndex(d => d.day === currentDay);
                window.appData.itinerary[dayIdx].items.push({title, time, loc, icon: 'map-pin'});
                window.appData.itinerary[dayIdx].items.sort((a,b) => a.time.localeCompare(b.time));
                renderItinerary();
                window.saveToCloud();
                lucide.createIcons();
            }
        };

        window.resetToDefault = () => {
            if(confirm("注意：這將會清除雲端所有改動並重置。")) {
                window.appData.itinerary = JSON.parse(JSON.stringify(defaultItinerary));
                window.appData.expenses = [];
                renderAll();
                window.saveToCloud();
            }
        };

        window.exportJSON = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(window.appData, null, 2));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", `thai_trip_backup_${new Date().toISOString().slice(0,10)}.json`);
            dlAnchor.click();
        };

        window.onload = init;
    </script>
</body>
</html>
