<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THAI.26 | 雙人即時看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --me: #6366f1; --partner: #ec4899; --common: #f59e0b; }
        body { background: #F3F4F6; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 頂部動態進度條 */
        .progress-glow { background: linear-gradient(90deg, var(--me), var(--partner)); height: 3px; width: 100%; position: fixed; top: 0; z-index: 200; }
        
        /* 側邊快選：快速標記誰付錢 */
        .quick-pay-btn { writing-mode: vertical-lr; font-size: 10px; font-weight: 900; letter-spacing: 2px; }
        
        /* 玻璃擬態卡片 */
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        
        /* 雙人頭像指示 */
        .avatar { width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; display: inline-block; }
        .avatar-me { background: var(--me); }
        .avatar-partner { background: var(--partner); }
        
        /* 隱藏捲軸 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 卡片出現動畫 */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: slideUp 0.4s ease forwards; }
    </style>
</head>
<body class="pb-32">

<div class="progress-glow"></div>

<nav class="sticky top-0 z-[100] bg-white/80 backdrop-blur-md px-6 py-4 flex justify-between items-center shadow-sm">
    <div>
        <h1 class="text-xl font-black italic tracking-tighter text-slate-800">THAI.26</h1>
        <div class="flex items-center gap-2 mt-1">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Live Synced</span>
        </div>
    </div>
    <div class="flex -space-x-2">
        <div class="avatar avatar-me shadow-sm"></div>
        <div class="avatar avatar-partner shadow-sm"></div>
    </div>
</nav>

<div class="flex gap-3 px-6 py-4 overflow-x-auto no-scrollbar bg-slate-50">
    <button onclick="setDay(1)" class="day-btn active bg-slate-900 text-white px-5 py-2 rounded-full text-xs font-bold transition-all">D1</button>
    <button onclick="setDay(2)" class="day-btn bg-white text-slate-400 px-5 py-2 rounded-full text-xs font-bold border border-slate-200 transition-all">D2</button>
    </div>

<main id="main-flow" class="px-6 py-4 space-y-6">
    <div class="text-center py-20 text-slate-300 font-bold italic">Gathering trip data...</div>
</main>

<div class="fixed bottom-0 w-full bg-white/90 backdrop-blur-xl border-t border-slate-100 p-5 z-[150] safe-bottom">
    <div class="flex items-center justify-between gap-4">
        <button onclick="openQuickPay('博懷')" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl text-xs font-black shadow-lg shadow-indigo-200 active:scale-95 transition-all">博懷付</button>
        <button onclick="openQuickPay('共同')" class="flex-1 bg-amber-500 text-white py-4 rounded-2xl text-xs font-black shadow-lg shadow-amber-200 active:scale-95 transition-all">公積金</button>
        <button onclick="openQuickPay('阿正')" class="flex-1 bg-pink-500 text-white py-4 rounded-2xl text-xs font-black shadow-lg shadow-pink-200 active:scale-95 transition-all">阿正付</button>
        
        <button onclick="openFullEdit()" class="w-14 h-14 bg-slate-900 text-white rounded-2xl flex items-center justify-center text-2xl shadow-xl active:scale-90 transition-all">+</button>
    </div>
</div>

<div id="pay-modal" class="fixed inset-0 bg-slate-900 z-[300] hidden flex flex-col p-10 text-white">
    <button onclick="closePay()" class="self-end text-slate-400 font-bold">CLOSE</button>
    <div class="flex-1 flex flex-col justify-center">
        <p id="pay-target" class="text-sm font-bold text-indigo-400 mb-2 uppercase tracking-widest"></p>
        <h3 id="pay-title" class="text-2xl font-black mb-10 text-slate-200">正在修改金額...</h3>
        <input type="number" id="pay-input" class="bg-transparent text-7xl font-black outline-none border-b-4 border-slate-800 pb-4 focus:border-indigo-500 transition-all" placeholder="0" autofocus>
    </div>
    <button onclick="savePay()" class="w-full bg-white text-slate-900 py-6 rounded-[2rem] font-black text-xl mb-10">OK, RECORD IT</button>
</div>

<script>
    // 這裡放入你的 GAS URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyTRAUKi7Uo8Mn0ih_q9qx4LBHM_6nwGIb6MLK1n1z46p4WcP9sMpLeuGS3utgMNQ19ZA/exec";
    let db = [];
    let curDay = 1;
    let targetPlan = null;

    async function fetchData() {
        const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
        db = await res.json();
        render();
    }

    function render() {
        const flow = document.getElementById('main-flow');
        flow.innerHTML = '';
        const plans = db.filter(p => p.Day == curDay);

        plans.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = `glass-card p-5 rounded-[2.5rem] relative shadow-sm animate-in`;
            card.style.animationDelay = `${i * 0.1}s`;
            
            const costDisp = p.Cost ? `฿${p.Cost}` : `<span class="opacity-30">未支出</span>`;
            const payerBadge = p.Payer === '共同' ? 'bg-amber-100 text-amber-600' : 
                               p.Payer === '阿正' ? 'bg-pink-100 text-pink-600' : 'bg-indigo-100 text-indigo-600';

            card.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <span class="text-[10px] font-black text-slate-300 tracking-tighter uppercase">${p.Time || '--:--'}</span>
                    <span class="text-[9px] font-bold px-3 py-1 rounded-full ${payerBadge}">${p.Payer || '待定'}</span>
                </div>
                <div class="flex justify-between items-end">
                    <div class="flex-1">
                        <h4 class="text-lg font-bold text-slate-800 leading-tight mb-1">${p.Title}</h4>
                        <p class="text-[10px] text-slate-400 italic truncate w-40">${p.Note || ''}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-black italic text-slate-700">${costDisp}</p>
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-slate-100/50 flex gap-2">
                    <button onclick="window.open('${p.URL || 'https://www.google.com/maps/search/' + p.Title}')" class="bg-white px-4 py-2 rounded-xl text-[10px] font-black shadow-sm border border-slate-100 flex items-center gap-1">📍 MAP</button>
                    <button onclick="openFullEdit(${JSON.stringify(p).replace(/"/g, '&quot;')})" class="bg-white px-4 py-2 rounded-xl text-[10px] font-black shadow-sm border border-slate-100">EDIT</button>
                </div>
            `;
            flow.appendChild(card);
        });
    }

    // 快速記帳邏輯：預設修改目前時間點最新的行程
    function openQuickPay(who) {
        // 尋找最近一筆還沒記帳的行程
        targetPlan = db.find(p => p.Day == curDay && !p.Cost) || db[0];
        document.getElementById('pay-target').innerText = `PAYER: ${who}`;
        document.getElementById('pay-title').innerText = targetPlan.Title;
        document.getElementById('pay-modal').classList.remove('hidden');
        document.getElementById('pay-input').focus();
        targetPlan.Payer = who; // 暫存付款人
    }

    async function savePay() {
        const cost = document.getElementById('pay-input').value;
        const payload = { ...targetPlan, action: "update", cost: cost };
        closePay();
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
        fetchData();
    }

    function closePay() { document.getElementById('pay-modal').classList.add('hidden'); }
    function setDay(d) { curDay = d; render(); }

    window.onload = fetchData;
</script>
</body>
</html>
